<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form id="form" action="processo.php" method="post">
        <div>
            <label for="nomeUser">Nome Completo:</label>
            <input type="text" name="nome" id="nomeUser">
        </div>

        <div>
            <label for="assuntoMsg">Assunto</label>
            <select name="assunto" id="assuntoMsg">
                <option value="duvida">Dúvida</option>
                <option value="matricula">Mátricula</option>
            </select>
        </div>

        <button type="submit">Enviar</button>
    </form>

    <script>
        const form = document.getElementById("form");
        
        form.addEventListener('submit', function(evento){
            
            const nome = document.getElementById("nomeUser").value
            if (nome == ""){
                evento.preventDefault()
                alert("O campo nome é obrigatório")
            }
        })


        
    </script>
</body>
</html>
